<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>玩偶聚合 WebHome | Tab S9 功能增强完整版</title>
<style>
/* ========== One UI 主题变量 双主题切换 ========== */
:root{
  --text:#ffffff;
  --muted:rgba(255,255,255,.65);
  --line:rgba(255,255,255,.12);
  --soft:rgba(30,38,48,.35);
  --soft-blur:rgba(22,28,36,.6);
  --accent:#ff6b35;
  --accent2:#ffb86b;
  --accent-grad:linear-gradient(135deg,#ff6b35,#ffb86b);
  --green:#42e88a;
  --green-glow:0 0 14px rgba(66,232,138,.35);
  --radius-xl:26px;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-full:999px;
  --shadow-deep:0 10px 30px rgba(0,0,0,.45);
  --shadow-soft:0 4px 16px rgba(0,0,0,.25);
  --transition-fast:all 0.18s cubic-bezier(0.2,0,0.2,1);
  --transition-slow:all 0.3s cubic-bezier(0.2,0,0.2,1);
  --bg:#0d1117;
}
/* 霓虹亮色主题 */
body.neon{
  --bg:#080c1a;
  --soft-blur:rgba(10,16,40,.7);
  --accent:#35a8ff;
  --accent2:#6bd9ff;
  --accent-grad:linear-gradient(135deg,#35a8ff,#6bd9ff);
  --green:#8a42e8;
  --green-glow:0 0 14px rgba(138,66,232,.35);
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{
  margin:0;min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Samsung Sans",Arial,sans-serif;
  scroll-behavior:smooth;
}
html:not(.fm-native) body{background:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:var(--radius-full)}

.app{min-height:100vh;padding:16px}
/* 顶部导航栏 新增主题切换按钮 */
.bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--soft-blur);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line);
  border-radius:var(--radius-xl);
  margin-bottom:16px;
  box-shadow:var(--shadow-soft);
}
.brand{
  font-size:24px;font-weight:900;white-space:nowrap;
  letter-spacing:0.5px;
}
.brand b{background:var(--accent-grad);-webkit-background-clip:text;color:transparent}
.search{
  flex:1;display:flex;gap:10px;align-items:center;
  background:rgba(255,255,255,.07);
  border:1px solid var(--line);
  border-radius:var(--radius-full);
  padding:10px 16px 10px 20px;
  transition:var(--transition-fast);
}
.search:focus-within{
  border-color:rgba(255,107,53,.4);
  box-shadow:0 0 0 3px rgba(255,107,53,.12);
  background:rgba(255,255,255,.09);
}
.search input{
  flex:1;min-width:0;background:transparent;border:0;outline:0;
  color:var(--text);font-size:16px;padding:4px 0;
}
.search input::placeholder{color:var(--muted)}
.btn{
  border:1px solid var(--line);
  background:var(--soft);color:var(--text);
  border-radius:var(--radius-full);
  padding:10px 16px;font-size:15px;font-weight:600;
  transition:var(--transition-fast);
  min-width:80px;
}
.btn:hover{
  transform:translateY(-2px);box-shadow:var(--shadow-soft);
  background:rgba(255,255,255,.1);
}
.btn.primary{
  border-color:rgba(255,107,53,.45);
  background:var(--accent-grad);
  color:#0a0603;font-weight:800;
}
.btn:active{transform:scale(0.96)}
.tabs,.chips{
  display:flex;gap:10px;overflow:auto;padding:0 4px 10px;
  scrollbar-width:none;
}
.tab,.chip{
  white-space:nowrap;border-radius:var(--radius-full);
  padding:10px 18px;background:rgba(255,255,255,.06);
  border:1px solid var(--line);color:var(--muted);
  font-weight:700;font-size:15px;
  transition:var(--transition-fast);
  min-height:44px;
}
.tab:hover,.chip:hover{background:rgba(255,255,255,.1)}
.tab.active,.chip.active{
  background:rgba(66,232,138,.12);
  border-color:rgba(66,232,138,.6);
  color:var(--green);font-weight:900;
  box-shadow:var(--green-glow);
}
.status{margin:12px 4px;color:var(--muted);font-size:14px}
.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}
/* 剧集封面卡片 新增收藏、资源角标 */
.card{
  border-radius:var(--radius-lg);overflow:hidden;
  background:#141a22;
  border:1px solid var(--line);
  transition:var(--transition-fast);
  cursor:pointer;
  position:relative;
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:var(--shadow-deep);
  border-color:rgba(255,184,107,.35);
}
.poster{
  aspect-ratio:3/4;
  position:relative;overflow:hidden;
  background:#1a222c;
}
.poster img{
  width:100%;height:100%;object-fit:cover;
  transition:var(--transition-slow);
  display:block;
}
.card:hover .poster img{transform:scale(1.09)}
.noimg{
  height:100%;display:grid;place-items:center;
  color:var(--muted);font-size:36px;
  background:linear-gradient(145deg,#202833,#11161d);
}
/* 右上角收藏爱心按钮 */
.fav-btn{
  position:absolute;top:10px;right:10px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  border:none;color:#fff;font-size:18px;z-index:2;
  display:grid;place-items:center;
}
.fav-btn.active{color:#ff4757}
/* 清晰度角标 */
.quality-badge{
  position:absolute;top:10px;left:10px;
  padding:2px 8px;border-radius:6px;font-size:10px;font-weight:bold;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
}
/* 资源数量角标 */
.source-badge{
  position:absolute;bottom:76px;right:10px;
  padding:2px 8px;border-radius:6px;font-size:10px;font-weight:bold;
  background:var(--accent-grad);color:#000;
}
.badge{
  position:absolute;right:8px;top:38px;
  padding:4px 10px;border-radius:var(--radius-full);
  background:rgba(0,0,0,.7);font-size:11px;font-weight:800;
  backdrop-filter:blur(6px);
}
.meta{padding:12px 14px}
.name{
  font-weight:800;font-size:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.remark{
  margin-top:6px;color:var(--muted);font-size:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pager{display:flex;gap:12px;justify-content:center;margin:20px 0}
.pager button{
  padding:12px 24px;border-radius:var(--radius-full);
  background:rgba(255,255,255,.07);border:1px solid var(--line);
  color:var(--text);font-size:15px;transition:var(--transition-fast);
  min-width:110px;
}
.pager button:hover{background:rgba(255,255,255,.12)}
.pager button:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.sheet{
  position:fixed;inset:0;z-index:40;display:none;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  overflow:auto;padding:16px;
}
.sheet.active{display:block}
.panel{
  background:linear-gradient(145deg,rgba(48,32,28,.65),rgba(18,22,28,.6));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-xl);
  padding:20px 18px 28px;margin:0 auto 40px;
  max-width:1100px;box-shadow:var(--shadow-deep);
}
.head{display:grid;grid-template-columns:38% 1fr;gap:18px}
.pic{
  width:100%;aspect-ratio:3/4;object-fit:cover;
  border-radius:var(--radius-lg);background:rgba(255,255,255,.06);
  box-shadow:var(--shadow-soft);
}
.title{font-size:26px;font-weight:700;line-height:1.2}
.info{
  font-size:15px;line-height:1.7;color:rgba(255,255,255,.78);
  max-height:260px;overflow:auto;margin:10px 0;
}
.pill{
  display:inline-block;margin:20px 0 12px;padding:10px 22px;
  border-radius:var(--radius-full);background:rgba(255,255,255,.08);
  border:1px solid rgba(255,184,107,.5);font-size:16px;font-weight:800;
}
.desc{font-size:16px;line-height:1.8;color:rgba(255,255,255,.75)}
.pan-list{display:grid;gap:12px;margin-top:10px}
.pan-item{
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  grid-template-rows:auto auto auto;
  gap:8px 10px;
  align-items:start;padding:14px 16px;border-radius:var(--radius-lg);
  background:rgba(255,255,255,.06);border:1px solid var(--line);
  transition:var(--transition-fast);
}
.pan-item:hover{
  background:rgba(255,255,255,.1);
  border-color:rgba(255,184,107,.25);
}
.pan-item .pan-type{
  grid-row:1;grid-column:1;
  align-self:center;justify-self:start;
  padding:3px 10px;font-size:11px;
  margin:0;letter-spacing:0.5px;
}
.pan-item > div:nth-of-type(2){
  grid-row:1;grid-column:2;
  align-self:center;
}
.pan-item .pan-name{
  font-size:15px;font-weight:800;
  line-height:1.4;word-break:break-all;color:var(--text);
}
.pan-item .pan-url{
  grid-row:2;grid-column:1/5;
  color:var(--muted);font-size:12px;line-height:1.5;
  word-break:break-all;
  font-family:"SF Mono",Monaco,monospace;
  background:rgba(255,255,255,.04);
  padding:8px 10px;border-radius:8px;
  border:1px solid rgba(255,255,255,.06);
  display:block;
}
.pan-item .copy-btn{
  grid-row:3;grid-column:1;
  justify-self:start;align-self:center;
  margin:0;padding:8px 14px;
}
.pan-item > button:last-child{
  grid-row:3;grid-column:2;
  justify-self:start;align-self:center;
  padding:8px 18px;
}
.pan-type{
  padding:5px 10px;border-radius:var(--radius-full);
  background:rgba(255,184,107,.18);color:var(--accent2);
  font-size:13px;font-weight:900;min-width:60px;text-align:center;
}
.pan-name{
  font-size:15px;font-weight:900;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pan-url{
  color:var(--muted);font-size:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.empty{
  padding:40px 20px;text-align:center;color:var(--muted);
  background:var(--soft);border:1px dashed var(--line);
  border-radius:var(--radius-xl);font-size:15px;
}
/* 复制链接小按钮 */
.copy-btn{
  padding:8px 12px;border-radius:var(--radius-md);
  background:rgba(255,255,255,.1);border:1px solid var(--line);
  color:var(--text);font-size:13px;
}
/* ========== 三星Tab S9 大屏媒体查询 ========== */
@media(min-width:720px){
  .grid{grid-template-columns:repeat(5,minmax(0,1fr))}
  .app{padding:24px 32px}
  .head{grid-template-columns:200px 1fr}
  .pic{width:200px}
  .bar{padding:14px 20px}
}
@media(min-width:1100px){
  .grid{grid-template-columns:repeat(7,minmax(0,1fr))}
  .app{max-width:1420px;margin:0 auto}
  .sheet{max-width:1200px;margin:0 auto}
}
</style>
</head>
<body>
<div class="app">
<div class="bar">
<div class="brand">玩偶<b>聚合</b></div>
<form class="search" id="searchForm">
<input id="kw" placeholder="聚合搜索网盘影视…">
<button class="btn primary">搜索</button>
</form>
<button class="btn" id="aggBtn">聚合</button>
<button class="btn" id="themeBtn">切换主题</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="chips" id="chips"></div>
<div class="status" id="status">准备加载…</div>
<main id="content"></main>
</div>
<div class="sheet" id="sheet">
<div class="panel" id="panel"></div>
</div>
<script>(function(){'use strict';
// 本地存储持久化：收藏 + 历史记录
const STORAGE_KEY_FAV = 'wo_fav_list';
const STORAGE_KEY_HIST = 'wo_history_list';
let favList = JSON.parse(localStorage.getItem(STORAGE_KEY_FAV) || '[]');
let historyList = JSON.parse(localStorage.getItem(STORAGE_KEY_HIST) || '[]');

if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');
const SITES=[
{id:'wanou',name:'玩偶',domains:['https://wogg.xxooo.cf','https://www.wogg.net'],listSelector:'.module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',categoryUrl:'/vodshow/{categoryId}--------{page}---.html',searchUrl:'/vodsearch/-------------.html?wd={keyword}&page={page}',cats:[['history','最近'],['fav','收藏'],['44','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','音乐'],['6','短剧'],['46','纪录片']]},
{id:'muou',name:'木偶',domains:['https://www.muou.site','https://www.muou.asia','https://666.666291.xyz'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['25','臻选'],['1','电影'],['2','电视剧'],['3','动漫'],['4','纪录片'],['29','综艺'],['30','原盘']]},
{id:'labi',name:'蜡笔',domains:['http://xiaocgege.shop'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['29','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['24','蜡笔4K']]},
{id:'zhizhen',name:'至臻',domains:['https://www.mihdr.top','https://mihdr.top'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['26','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['24','老剧']]},
{id:'erxiao',name:'二小',domains:['https://www.2xiaopan.top'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['4','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['21','综艺']]},
{id:'huban',name:'虎斑',domains:['http://38.76.197.172:16969','http://103.45.162.207:20720','http://xhban.xyz:20720'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['6','臻彩'],['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['5','短剧'],['30','115网盘']]},
{id:'kuaiying',name:'快映',domains:['http://103.45.162.207:12512','http://38.76.197.172:12521'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['5','臻彩'],['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['6','短剧'],['30','115'],['35','123'],['36','天移迅']]},
{id:'shandian',name:'闪电',domains:['http://shandian.blog','http://sd.sduc.site'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['30','短剧']]},
{id:'ouge',name:'欧哥',domains:['https://woog.nxog.eu.org'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['21','综合']]}
];
let activeSite='wanou',activeCat='',page=1,aggregate=true,last=[];
const $=s=>document.querySelector(s),tabs=$('#tabs'),chips=$('#chips'),content=$('#content'),status=$('#status');

// 本地存储工具函数
function saveFav(){localStorage.setItem(STORAGE_KEY_FAV,JSON.stringify(favList))}
function saveHistory(){localStorage.setItem(STORAGE_KEY_HIST,JSON.stringify(historyList))}
function isFav(item){return favList.some(x=>x.href===item.href)}
function toggleFav(item){
  const idx = favList.findIndex(x=>x.href===item.href);
  if(idx>-1) favList.splice(idx,1);
  else favList.unshift(item);
  saveFav();
  renderGrid(last,true);
}
function addHistory(item){
  const idx = historyList.findIndex(x=>x.href===item.href);
  if(idx>-1) historyList.splice(idx,1);
  historyList.unshift(item);
  if(historyList.length>60) historyList.length=60;
  saveHistory();
}

function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'"'}[c]))}
function clean(s){return String(s||'').replace(/\s+/g,' ').trim()}
function site(){return SITES.find(x=>x.id===activeSite)||SITES[0]}
function abs(base,u){try{return new URL(u,base+'/').href}catch(e){return u||''}}
async function req(url){
  status.textContent='请求：'+url;
  if(window.fm&&fm.req){
    let r=await fm.req(url,{method:'GET',headers:{'User-Agent':'Mozilla/5.0','Referer':url},responseType:'text',timeout:16});
    if(!r.ok)throw new Error(r.error||('HTTP '+r.status));
    return r.body||''
  }
  let r=await fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}});
  return await r.text()
}
async function get(site,path){
  let lastErr='';
  for(let d of site.domains){
    let u=path.startsWith('http')?path:d.replace(/\/+$/,'')+path;
    try{
      let h=await req(u);
      if(h&&!/just a moment|cf-browser|access denied/i.test(h))return{html:h,base:d.replace(/\/+$/,'')}
    }catch(e){lastErr=e.message}
  }
  throw new Error(lastErr||'全部域名失败')
}
function doc(h){return new DOMParser().parseFromString(h,'text/html')}
function imgUrl(u){
  if(!u)return'';
  u=u.replace(/^\/\//,'https://');
  let m=u.match(/^https?:\/\/image\.baidu\.com\/search\/down\?url=([^&]+)/i);
  return m?decodeURIComponent(m[1]):u
}
// 自动识别清晰度
function getQuality(text){
  if(/4K|2160/i.test(text))return'4K';
  if(/1080|1080P/i.test(text))return'1080P';
  if(/720|720P/i.test(text))return'720P';
  return'';
}
function cardFrom(el,base,site){
  let a=el.querySelector('a[href]')||el.closest('a[href]')||el,href=a.getAttribute('href')||'';
  let img=el.querySelector('img'),title=a.getAttribute('title')||img&&img.getAttribute('alt')||clean(el.querySelector('.module-item-title,.module-search-item-title,.video-title,.title')?.textContent)||clean(a.textContent);
  let pic=imgUrl(img&&(img.getAttribute('data-src')||img.getAttribute('data-original')||img.getAttribute('src'))||'');
  let remark=clean(el.querySelector('.module-item-note,.module-search-item-note,.video-info,.note')?.textContent)||site.name;
  return{
    title:title.replace(/\s+/g,' ').slice(0,60),
    href:abs(base,href),
    pic:abs(base,pic),
    remark,
    siteId:site.id,
    siteName:site.name,
    quality:getQuality(title+' '+remark)
  }
}
function renderTabs(){
  tabs.innerHTML=SITES.map(s=>`<button class="tab ${activeSite===s.id?'active':''}" data-id="${s.id}">${s.name}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
    activeSite=b.dataset.id;
    const s=site();
    // 特殊分类：最近/收藏
    if(activeCat==='history'||activeCat==='fav')activeCat=s.cats[2][0];
    page=1;renderTabs();renderChips();loadCategory()
  })
}
function renderChips(){
  let s=site();
  if(!activeCat&&s.cats[0])activeCat=s.cats[0][0];
  chips.innerHTML=s.cats.map(c=>`<button class="chip ${activeCat===c[0]?'active':''}" data-id="${c[0]}">${c[1]}</button>`).join('');
  chips.querySelectorAll('.chip').forEach(b=>b.onclick=async()=>{
    activeCat=b.dataset.id;page=1;renderChips();
    if(activeCat==='history'){renderGrid(historyList,false);status.textContent='浏览历史 · '+historyList.length+' 条'}
    else if(activeCat==='fav'){renderGrid(favList,false);status.textContent='我的收藏 · '+favList.length+' 条'}
    else loadCategory()
  })
}
// 渲染卡片（新增收藏、清晰度、资源数量角标）
function card(v,i){
  const favActive = isFav(v) ? 'active' : '';
  const qualityTag = v.quality ? `<span class="quality-badge">${esc(v.quality)}</span>` : '';
  const sourceCount = v.sources ? v.sources.length : 1;
  return`
<article class="card" data-i="${i}" data-href="${esc(v.href)}">
  <button class="fav-btn ${favActive}" data-href="${esc(v.href)}">♥</button>
  <div class="poster">
    ${qualityTag}
    ${v.pic?`<img loading="lazy" referrerpolicy="no-referrer" src="${esc(v.pic)}">`:'<div class="noimg">影</div>'}
    <span class="badge">${esc(v.siteName)}</span>
    <span class="source-badge">${sourceCount}条资源</span>
  </div>
  <div class="meta">
    <div class="name">${esc(v.title)}</div>
    <div class="remark">${esc(v.remark)}</div>
  </div>
</article>`
}
function renderGrid(list,pager){
  last=list;
  content.innerHTML=list.length?`<div class="grid">${list.map(card).join('')}</div>${pager?`<div class="pager"><button id="prev" ${page<=1?'disabled':''}>上一页</button><button id="next">下一页</button></div>`:''}`:'<div class="empty">暂无内容</div>';
  // 收藏按钮点击事件
  content.querySelectorAll('.fav-btn').forEach(btn=>{
    btn.onclick=(e)=>{e.stopPropagation();const h=btn.dataset.href;const item=list.find(x=>x.href===h);if(item)toggleFav(item)}
  })
  // 卡片打开详情
  content.querySelectorAll('.card').forEach(c=>c.onclick=(e)=>{
    if(e.target.classList.contains('fav-btn'))return;
    const i=parseInt(c.dataset.i);openDetail(list[i])
  });
  let p=$('#prev'),n=$('#next');
  if(p)p.onclick=()=>{if(page>1){page--;loadCategory()}};
  if(n)n.onclick=()=>{page++;loadCategory()}
}
function catUrl(s,c,p){
  if(s.categoryUrl)return s.categoryUrl.replace('{categoryId}',c).replace('{page}',p);
  return `/index.php/vod/show/id/${c}/page/${p}.html`
}
async function loadCategory(){
  content.innerHTML='<div class="empty">加载中…</div>';
  let s=site();
  try{
    let r=await get(s,catUrl(s,activeCat,page)),d=doc(r.html);
    let els=[...d.querySelectorAll(s.listSelector||'.module-item')];
    let list=els.map(e=>cardFrom(e,r.base,s)).filter(x=>x.href&&x.title).slice(0,60);
    renderGrid(list,true);
    status.textContent=`${s.name} · 第 ${page} 页 · ${list.length} 条`
  }catch(e){content.innerHTML='<div class="empty">分类失败：'+esc(e.message)+'</div>'}
}
async function searchSite(s,q){
  let path=s.searchUrl?s.searchUrl.replace('{keyword}',encodeURIComponent(q)).replace('{page}',1):`/index.php/vod/search/page/1/wd/${encodeURIComponent(q)}.html`;
  let r=await get(s,path),d=doc(r.html);
  let els=[...d.querySelectorAll(s.searchListSelector||'.module-search-item')];
  let list=els.map(e=>cardFrom(e,r.base,s)).filter(x=>x.href&&x.title).slice(0,20);
  return list
}
function normName(t){return clean(t).replace(/[《》\[\]【】\s·.\-_:：]/g,'').replace(/第[一二三四五六七八九十\d]+季|Season\s*\d+/ig,'').toLowerCase()}
async function search(q){
  content.innerHTML='<div class="empty">聚合搜索中…</div>';
  let arr=[];
  if(aggregate){
    let rs=await Promise.allSettled(SITES.map(s=>searchSite(s,q)));
    rs.forEach(r=>{if(r.status==='fulfilled')arr=arr.concat(r.value)});
    let map=new Map();
    arr.forEach(x=>{let k=normName(x.title);if(!map.has(k))map.set(k,Object.assign({},x,{sources:[x]}));else map.get(k).sources.push(x)});
    arr=[...map.values()]
  }else arr=await searchSite(site(),q);
  renderGrid(arr,false);
  status.textContent=`搜索：${q} · ${arr.length} 条`
}
function panType(u){
  u=String(u||'').toLowerCase();
  if(u.includes('pan.baidu'))return'百度';
  if(u.includes('quark'))return'夸克';
  if(u.includes('aliyun')||u.includes('alipan'))return'阿里';
  if(u.includes('xunlei'))return'迅雷';
  if(u.includes('115.com'))return'115';
  if(u.includes('123'))return'123';
  if(u.includes('cloud.189'))return'天翼';
  if(u.includes('caiyun')||u.includes('139'))return'移动';
  return'网盘'
}
// 复制链接工具
async function copyText(text){
  try{await navigator.clipboard.writeText(text);alert('链接已复制！')}catch(e){alert('复制失败，请手动复制：'+text)}
}
async function parseDetail(v){
  let sources=v.sources||[v],all=[];
  let main=null;
  for(let src of sources.slice(0,5)){
    let s=SITES.find(x=>x.id===src.siteId)||site();
    try{
      let r=await get(s,src.href),d=doc(r.html);
      if(!main){
        let title=clean(d.querySelector('h1,.title,.module-info-heading h1')?.textContent)||src.title;
        let pic=imgUrl(d.querySelector('.module-info-poster img,.detail-pic img,img')?.getAttribute('src')||src.pic);
        let desc=clean(d.querySelector('.module-info-introduction,.desc,.module-info-content')?.textContent)||'';
        main={title,pic:abs(r.base,pic),desc,siteName:src.siteName}
      }
      let txtEls=[...d.querySelectorAll(s.detailPanSelector||'.module-row-info p')];
      txtEls.forEach(p=>{
        let t=clean(p.textContent);
        if(/^https?:/.test(t))all.push({name:src.siteName+' · '+panType(t),url:t,type:panType(t),siteName:src.siteName})
      });
      [...d.querySelectorAll('a[href]')].forEach(a=>{
        let u=a.getAttribute('href')||'';
        if(/pan\.baidu|quark|aliyun|alipan|xunlei|115\.com|123|cloud\.189|caiyun|magnet:/i.test(u))all.push({name:src.siteName+' · '+(clean(a.textContent)||panType(u)),url:abs(r.base,u),type:panType(u),siteName:src.siteName})
      })
    }catch(e){}
  }
  let seen=new Set();
  all=all.filter(x=>x.url&&!seen.has(x.url)&&(seen.add(x.url)||true));
  return{info:main||v,pans:all}
}
async function openDetail(v){
  addHistory(v); // 打开自动加入历史记录
  $('#sheet').classList.add('active');
  $('#panel').innerHTML='<div class="empty">读取详情…</div>';
  try{
    let d=await parseDetail(v),info=d.info;
    $('#panel').innerHTML=`
<button class="btn" id="closeBtn">返回</button>
<div class="head">
  <img class="pic" referrerpolicy="no-referrer" src="${esc(info.pic||v.pic||'')}" onerror="this.style.display='none'">
  <div>
    <div class="title">${esc(info.title||v.title)}</div>
    <div class="info">
      <div><b>来源：</b>${esc((v.sources||[v]).map(x=>x.siteName).join(' / '))}</div>
      <div><b>资源：</b>${d.pans.length} 条</div>
      <div><b>清晰度：</b>${v.quality||'未知'}</div>
    </div>
  </div>
</div>
<div class="pill">简介</div>
<div class="desc">${esc(info.desc||v.remark||'暂无简介')}</div>
<div class="pill">网盘资源</div>
<div class="pan-list">
${d.pans.map((p,i)=>`
<div class="pan-item">
  <span class="pan-type">${esc(p.type)}</span>
  <div>
    <div class="pan-name">${esc(p.name)}</div>
    <div class="pan-url">${esc(p.url)}</div>
  </div>
  <button class="copy-btn" data-link="${esc(p.url)}">复制链接</button>
  <button class="btn" data-i="${i}">打开</button>
</div>`).join('')||'<div class="empty">未提取到网盘链接</div>'}
</div>`;
    $('#closeBtn').onclick=closeDetail;
    // 复制按钮绑定
    $('#panel').querySelectorAll('.copy-btn').forEach(btn=>{
      btn.onclick=()=>copyText(btn.dataset.link)
    })
    $('#panel').querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>playPan(d.pans[parseInt(b.dataset.i)]))
  }catch(e){
    $('#panel').innerHTML=`
<button class="btn" onclick="window.__woClose()">返回</button>
<div class="empty">详情失败：${esc(e.message)}</div>`
  }
}
async function playPan(p){
  let u=p.url;
  if(window.fm&&fm.play){
    await fm.play(u.startsWith('magnet:')?u:'push://'+u,p.name);
    return
  }
  location.href=u
}
function closeDetail(){$('#sheet').classList.remove('active')}
// 主题切换
$('#themeBtn').onclick=()=>{document.body.classList.toggle('neon')}
searchForm.onsubmit=e=>{e.preventDefault();let q=kw.value.trim();q?search(q):loadCategory()};
aggBtn.onclick=()=>{aggregate=!aggregate;aggBtn.textContent=aggregate?'聚合':'单站'};
window.__woClose=closeDetail;
activeCat=site().cats[2][0];
renderTabs();renderChips();loadCategory();
})();
</script>
